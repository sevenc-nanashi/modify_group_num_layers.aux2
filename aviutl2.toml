#:schema ./.aviutl2-cli/aviutl2.schema.json
# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。

[project]
id = "sevenc-nanashi.modify_group_num_layers-aux2"
name = "modify_group_num_layers.aux2"
version = "0.1.0"

[development]
aviutl2_version = "latest"

[artifacts.English-modify_group_num_layers-aul2]
destination = "Language/English.modify_group_num_layers.aul2"
source = "./i18n/English.modify_group_num_layers.aul2"

[artifacts.English-aul2]
enabled = false
destination = "Language/English.aul2"
source = "https://raw.githubusercontent.com/aviutl2/aviutl2_community_translation/refs/heads/main/locales/community_en.aul2"

[artifacts.English-aul2.profiles.debug]
enabled = true

[artifacts.modify_group_num_layers-aux2]
destination = "Plugin/modify_group_num_layers.aux2"

[artifacts.modify_group_num_layers-aux2.profiles.debug]
build = "cargo build"
source = "target/debug/modify_group_num_layers_aux2.dll"

[artifacts.modify_group_num_layers-aux2.profiles.release]
build = "cargo build --release"
source = "target/release/modify_group_num_layers_aux2.dll"

[catalog]
id = "sevenc-nanashi.modify_group_num_layers-aux2"
name = "modify_group_num_layers.aux2"
summary = "「対象レイヤー数」をショートカットキーから変更できるようにする汎用プラグイン"
type = "common"
description = { type = "url", url = "https://raw.githubusercontent.com/sevenc-nanashi/modify_group_num_layers.aux2/main/README.md" }
author = "Nanashi."
download_source = { type = "github", owner = "sevenc-nanashi", repo = "modify_group_num_layers.aux2" }
homepage = "https://github.com/sevenc-nanashi/modify_group_num_layers.aux2"
license = { type = "MIT", template = false, text = { type = "file", path = "./LICENSE" } }

[release]
prebuild = ["cargo about generate ./about.hbs -o ./release/package.txt"]
package_template = "./release/package.txt"
package_information = "{name} v{version} / 「対象レイヤー数」をショートカットキーから変更できるようにする汎用プラグイン"

