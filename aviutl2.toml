#:schema ./.aviutl2-cli/aviutl2.schema.json
# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。

[project]
id = "sevenc-nanashi.my_aux2_template-aux2"
name = "my_aux2_template.aux2"
version = "0.1.0"

[development]
aviutl2_version = "latest"

[artifacts.English-my_aux2_template_aux2-aul2]
destination = "Language/English.my_aux2_template_aux2.aul2"
source = "./i18n/English.my_aux2_template_aux2.aul2"

[artifacts.English-aul2]
enabled = false
destination = "Language/English.aul2"
source = "https://raw.githubusercontent.com/aviutl2/aviutl2_community_translation/refs/heads/main/locales/original_english.aul2"

[artifacts.English-aul2.profiles.debug]
enabled = true

[artifacts.my_aux2_template_aux2-aux2]
destination = "Plugin/my_aux2_template_aux2.aux2"

[artifacts.my_aux2_template_aux2-aux2.profiles.debug]
build = "cargo build"
source = "target/debug/my_aux2_template_aux2.dll"

[artifacts.my_aux2_template_aux2-aux2.profiles.release]
build = "cargo build --release"
source = "target/release/my_aux2_template_aux2.dll"

[catalog]
id = "sevenc-nanashi.my_aux2_template-aux2"
name = "my_aux2_template.aux2"
summary = "TODO: プラグイン説明"
type = "common"
description = { type = "url", url = "https://raw.githubusercontent.com/sevenc-nanashi/my_aux2_template.aux2/main/README.md" }
author = "Nanashi."
download_source = { type = "github", owner = "sevenc-nanashi", repo = "my_aux2_template.aux2" }
homepage = "https://github.com/sevenc-nanashi/my_aux2_template.aux2"
license = { type = "MIT", template = false, text = { type = "file", path = "./LICENSE" } }

[release]
prebuild = ["cargo about generate ./about.hbs -o ./release/package.txt"]
package_template = "./release/package.txt"
package_information = "{name} v{version} / TODO: プラグイン説明"

